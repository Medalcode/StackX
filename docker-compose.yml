version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: stackx
      POSTGRES_PASSWORD: stackx
      POSTGRES_DB: stackx
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://stackx:stackx@db:5432/stackx
      OLLAMA_URL: ${OLLAMA_URL}
      REDIS_URL: redis://redis:6379/0
      SANITY_PROJECT_ID: ${SANITY_PROJECT_ID:-}
      SANITY_DATASET: ${SANITY_DATASET:-production}
      SANITY_TOKEN: ${SANITY_TOKEN:-}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app/backend

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A backend.app.celery_app.celery worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+psycopg2://stackx:stackx@db:5432/stackx
      REDIS_URL: redis://redis:6379/0
      SANITY_PROJECT_ID: ${SANITY_PROJECT_ID:-}
      SANITY_DATASET: ${SANITY_DATASET:-production}
      SANITY_TOKEN: ${SANITY_TOKEN:-}
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app/backend

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A backend.app.celery_app.celery beat --loglevel=info
    environment:
      DATABASE_URL: postgresql+psycopg2://stackx:stackx@db:5432/stackx
      REDIS_URL: redis://redis:6379/0
      SYNC_INTERVAL_SECONDS: ${SYNC_INTERVAL_SECONDS:-3600}
      SANITY_PROJECT_ID: ${SANITY_PROJECT_ID:-}
      SANITY_DATASET: ${SANITY_DATASET:-production}
      SANITY_TOKEN: ${SANITY_TOKEN:-}
    depends_on:
      - redis
    volumes:
      - ./backend:/app/backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  db-data:
